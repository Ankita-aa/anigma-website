<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>VASP Studio | Anigma</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header class="site-header">
    <a class="brand" href="index.html" aria-label="Anigma home">
      <img src="anigma_logo.jpg" alt="Anigma logo" />
    </a>

    <nav class="nav-links" aria-label="Main navigation">
      <a href="index.html#products">Products</a>
      <a class="login-link" href="index.html#login">Login</a>
    </nav>
  </header>

  <main class="vasp-ref-page">
    <section class="vasp-ref-card">
      <h1>Generate Video</h1>
      <p class="vasp-ref-sub">Upload one video and enter an instruction for VASP.</p>

      <form id="vaspForm">
        <label class="vasp-ref-label" for="vaspBaseUrl">Railway API Base URL</label>
        <input id="vaspBaseUrl" type="url" placeholder="https://your-service.up.railway.app" required />

        <label class="vasp-ref-label" for="vaspEndpoint">API Route</label>
        <input id="vaspEndpoint" type="text" value="/generate" required />

        <label class="vasp-ref-label" for="vaspApiKey">API Key (optional)</label>
        <input id="vaspApiKey" type="password" placeholder="Bearer token" />

        <label class="vasp-ref-label" for="vaspMedia">Video</label>
        <input id="vaspMedia" name="video" type="file" accept="video/*" required />

        <label class="vasp-ref-label" for="vaspInstruction">Instruction</label>
        <textarea id="vaspInstruction" rows="5" placeholder="Create a clean engaging short-form video with synced captions." required></textarea>

        <label class="vasp-ref-label" for="vaspCaption">Caption (optional)</label>
        <input id="vaspCaption" type="text" placeholder="Optional caption text" />

        <button id="vaspSubmit" type="submit">Generate</button>
      </form>

      <div id="vaspStatus" class="vasp-ref-status" aria-live="polite">No request sent yet.</div>
    </section>

    <section class="vasp-ref-card vasp-ref-result">
      <h2>Result</h2>
      <div id="vaspError" class="vasp-ref-error"></div>
      <video id="vaspVideo" controls playsinline></video>
      <a id="vaspDownloadLink" href="#" target="_blank" rel="noopener noreferrer"></a>
      <pre id="vaspResponse">{}</pre>
    </section>
  </main>

  <script src="tool-pages.js"></script>
</body>
</html>
