<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>VASP Generate | Anigma</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header class="site-header">
    <a class="brand" href="index.html" aria-label="Anigma home">
      <img src="anigma_logo.jpg" alt="Anigma logo" />
    </a>

    <nav class="nav-links" aria-label="Main navigation">
      <a href="index.html#products">Products</a>
      <a class="login-link" href="index.html#login">Login</a>
    </nav>
  </header>

  <main class="vasp-page">
    <section class="vasp-card vasp-generate-card">
      <p class="eyebrow">VASP</p>
      <h1>Generate Video</h1>
      <p class="vasp-sub">Upload a source video and describe the edit you want VASP to generate.</p>

      <form id="vaspForm">
        <label class="vasp-label" for="vaspMedia">Video</label>
        <input id="vaspMedia" name="video" type="file" accept="video/*" required />

        <label class="vasp-label" for="vaspInstruction">Instruction</label>
        <textarea id="vaspInstruction" rows="6" placeholder="Create a clean engaging short-form video with synced captions." required></textarea>

        <button id="vaspSubmit" type="submit">Generate</button>
      </form>

      <div id="vaspStatus" class="vasp-status" aria-live="polite">Ready to generate.</div>
    </section>

    <section class="vasp-card vasp-result-card">
      <div class="vasp-result-header">
        <div>
          <p class="eyebrow">Result</p>
          <h2>Generated Output</h2>
        </div>
        <span id="vaspEditName" class="vasp-edit-name"></span>
      </div>

      <div id="vaspError" class="vasp-error"></div>
      <video id="vaspVideo" controls playsinline></video>
      <a id="vaspDownloadLink" class="vasp-download-link" href="#" target="_blank" rel="noopener noreferrer"></a>

      <details id="vaspTranscriptWrap" class="vasp-transcript" open>
        <summary>Transcript</summary>
        <p id="vaspTranscript">Generated transcript will appear here.</p>
      </details>
    </section>
  </main>

  <script src="tool-pages.js"></script>
</body>
</html>
