<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#36454f" />
  <title>VASP Generate | Anigma</title>
  <link rel="stylesheet" href="vasp.css" />
</head>
<body style="margin:0; padding:0; overflow-x:hidden;">
  <div class="vasp-container">
    <div class="vasp-header" id="header-anim">
      <div class="title-animation">
        <h1>V A S P  |  A N I G M A</h1>
      </div>
      <div class="status-indicator">
        <div class="glowing-circle"></div>
      </div>
    </div>

    <div class="vasp-main">
      <div class="input-controller">
        <div class="input-panel">
          <div class="title-section">
            <div class="color-gradient">
              <div class="primary-color"></div>
              <div class="secondary-color"></div>
            </div>
            <h2>Generate Video</h2>
          </div>
          <div class="input-group" id="main-input">
            <div class="icon-panel">
              <div class="music-note"></div>
            </div>
            <div class="input-field" id="vaspMediaField">
              <label for="vaspMedia">🎵 Main Track</label>
              <input type="file" id="vaspMedia" accept="video/*,audio/*,.mp3,.m4a,.wav" />
            </div>
            <div class="info-bubble" id="mediaInfo"></div>
          </div>
          <div class="input-group">
            <div class="icon-panel">
              <div class="globe-icon"></div>
            </div>
            <div class="input-field" id="vaspLanguageField">
              <label for="vaspLanguage">🌐 Language</label>
              <select id="vaspLanguage">
                <option value="">Auto</option>
                <option value="en">English</option>
                <option value="hi">Hindi</option>
                <option value="es">Spanish</option>
                <option value="fr">French</option>
                <option value="de">German</option>
                <option value="it">Italian</option>
                <option value="pt">Portuguese</option>
                <option value="bn">Bengali</option>
                <option value="ta">Tamil</option>
                <option value="te">Telugu</option>
                <option value="mr">Marathi</option>
                <option value="gu">Gujarati</option>
                <option value="pa">Punjabi</option>
                <option value="ur">Urdu</option>
                <option value="ar">Arabic</option>
                <option value="ja">Japanese</option>
                <option value="ko">Korean</option>
                <option value="zh">Chinese</option>
              </select>
            </div>
          </div>
          <div class="input-group">
            <div class="icon-panel">
              <div class="pencil-icon"></div>
            </div>
            <div class="input-field" id="vaspInstructionField">
              <label for="vaspInstruction">✍️ Instructions</label>
              <textarea id="vaspInstruction" placeholder="Create a cool short video with synced captions"></textarea>
            </div>
          </div>
          <div class="input-group">
            <div class="icon-panel">
              <div class="plus-icon"></div>
            </div>
            <div class="input-group-container" id="mediaLibrary">
              <h3>Supporting Media</h3>
              <div class="media-gallery"></div>
            </div>
          </div>
        </div>
      </div>
      <div class="animation-panel">
        <div class="preview-container">
          <div class="video-preview" id="videoPreview"></div>
          <button id="vaspSubmit" class="submit-btn">Prepare transcript</button>
          <a id="downloadBtn" class="download-link" href="#" target="_blank" rel="noopener noreferrer"></a>
        </div>
        <div class="status-anim">
          <div class="status-circle"></div>
          <div class="text-anim" id="statusText">Ready to generate</div>
        </div>
      </div>
    </div>
  </div>
<script src="tool-pages.js"></script>
</body>
</html>
